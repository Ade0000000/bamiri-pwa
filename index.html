<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>舞台リンクメモ</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1d4f91">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="舞台リンクメモ">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --surface-subtle: #eef4ff;
            --text: #223045;
            --muted: #5d6b82;
            --line: #d4dce8;
            --line-strong: #9fb0c8;
            --primary: #1d4f91;
            --primary-dark: #173f73;
            --success: #177245;
            --warning: #b7791f;
            --danger: #c0392b;
            --purple: #7d4ab0;
            --shadow: 0 2px 8px rgba(16, 24, 40, 0.08);
            --radius: 10px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
            line-height: 1.5;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .version-text {
            font-size: 0.8rem;
            font-weight: normal;
            opacity: 0.85;
            margin-left: 5px;
        }
        .header-reset-btn {
            position: absolute;
            right: 15px;
            top: 12px;
            background-color: #fff;
            color: var(--danger);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }
        .container {
            padding: 10px;
            padding-bottom: 140px;
            max-width: 880px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
        }
        .title-card { border: 2px solid var(--primary); background-color: #f3f8ff; }
        .base-point-card { border: 2px solid var(--purple); background-color: #fbf9ff; }
        .storage-status-card { border: 2px solid #1b8a6b; background-color: #effbf8; }
        .storage-status-card.warn { border-color: #d39c22; background-color: #fff9ea; }
        .storage-status-card.error { border-color: var(--danger); background-color: #fff3f2; }
        .card-header {
            font-weight: bold;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .title-card .card-header { color: var(--primary); }
        .base-point-card .card-header { border-bottom-color: var(--purple); color: var(--purple); }
        .storage-status-card .card-header { border-bottom-color: #1b8a6b; color: #1b8a6b; }
        .storage-status-card.warn .card-header { border-bottom-color: #d39c22; color: #b7791f; }
        .storage-status-card.error .card-header { border-bottom-color: var(--danger); color: var(--danger); }
        .status-text {
            font-size: 0.92rem;
            line-height: 1.55;
            white-space: pre-wrap;
            color: var(--muted);
        }
        .record-card.is-locked {
            background-color: #f7f8fa;
            border-color: #cfd5df;
        }
        .muted { color: var(--muted); font-size: 0.88rem; }
        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 5px;
            font-weight: bold;
        }
        .help-text {
            display: block;
            margin-top: 4px;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .flex-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .type-row {
            display: grid;
            grid-template-columns: 1.35fr 0.8fr;
            gap: 10px;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--text);
        }
        textarea {
            min-height: 84px;
            resize: vertical;
        }
        input:disabled, select:disabled, button:disabled, textarea:disabled {
            background-color: #edf1f5;
            color: #6b7280;
            opacity: 1;
            -webkit-text-fill-color: #6b7280;
        }
        .unit {
            font-size: 0.9rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .camera-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 10px 12px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .camera-btn.has-photo { background-color: var(--success); }
        .photo-preview {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 1px solid var(--line);
            background-color: #000;
            cursor: pointer;
        }
        .photo-delete-btn {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid #e1b8b0;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: #fff;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        .toggle-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }
        details.disclosure {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            margin-bottom: 12px;
            overflow: hidden;
        }
        details.disclosure summary {
            list-style: none;
            cursor: pointer;
            padding: 11px 12px;
            font-weight: bold;
            color: var(--primary);
            background: #f7fbff;
        }
        details.disclosure summary::-webkit-details-marker { display: none; }
        .disclosure-body {
            padding: 12px 12px 4px 12px;
            border-top: 1px solid var(--line);
        }
        .record-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .record-actions button {
            flex: 1;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 10px 12px;
            font-size: 0.92rem;
            font-weight: bold;
            cursor: pointer;
        }
        .delete-btn { background-color: var(--danger); }
        .lock-btn { background-color: #6b7280; }
        .lock-btn.locked-state { background-color: #cf8d1b; }
        .tab-container {
            display: flex;
            overflow-x: auto;
            background-color: #e1e4e8;
            padding: 10px 10px 0;
            border-radius: 8px 8px 0 0;
            margin-bottom: 15px;
            gap: 5px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 12px 15px;
            background-color: #bdc3c7;
            color: #333;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }
        .tab-edit-icon, .tab-delete-icon {
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.8;
        }
        .tab-add-btn {
            padding: 12px 15px;
            background-color: var(--success);
            color: white;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .add-btn {
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: bold;
            width: 100%;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        .btn-primary { background-color: var(--primary); }
        .btn-secondary { background-color: var(--success); }
        .floating-btn-container {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            width: 96%;
            max-width: 720px;
            z-index: 100;
        }
        .floating-btn {
            flex: 1;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.18);
            cursor: pointer;
            line-height: 1.3;
        }
        .zip-btn { background-color: var(--success); }
        .cad-btn { background-color: #7c56aa; }
        .pdf-btn { background-color: var(--danger); }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.78);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        .image-modal, .cad-modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column;
        }
        .cad-modal { background-color: rgba(0,0,0,0.6); }
        .image-modal-content { max-width: 95%; max-height: 90%; border-radius: 4px; object-fit: contain; }
        .image-modal-close { position: absolute; top: 15px; right: 25px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 2001; }
        .cad-modal-box {
            background-color: #fff; padding: 20px; border-radius: 8px; width: 90%; max-width: 360px;
        }
        .cad-modal-title {
            font-size: 1.15rem; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #7c56aa; padding-bottom: 5px; color: #7c56aa;
        }
        .cad-checkbox-group { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .cad-checkbox-group label { display: flex; align-items: center; font-size: 1rem; font-weight: bold; cursor: pointer; color: var(--text); }
        .cad-checkbox-group input[type="checkbox"] { width: 22px; height: 22px; margin-right: 10px; }
        .cad-modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .cad-btn-cancel, .cad-btn-exec {
            border: none; padding: 10px 15px; border-radius: 999px; font-weight: bold; cursor: pointer;
        }
        .cad-btn-cancel { background-color: #e5e7eb; color: var(--text); }
        .cad-btn-exec { background-color: #7c56aa; color: white; }

        @media print {
            @page { margin: 10mm; }
            body { background-color: #fff !important; color: #000 !important; padding: 0 !important; font-size: 11pt; }
            header, .button-group, .floating-btn-container, .image-modal, .photo-delete-btn, .cad-modal, .tab-container, .record-actions, details summary, .camera-btn {
                display: none !important;
            }
            details.disclosure { border: none !important; margin: 0 !important; padding: 0 !important; }
            .disclosure-body { display: block !important; padding: 0 !important; border: none !important; }
            .card {
                box-shadow: none !important;
                border: 1px solid #333 !important;
                border-radius: 0 !important;
                margin-bottom: 10px !important;
                padding: 10px 15px !important;
                background-color: #fff !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
            .card-header {
                border-bottom: 2px solid #333 !important;
                padding-bottom: 5px !important;
                margin-bottom: 8px !important;
                color: #333 !important;
            }
            .input-group {
                display: flex !important;
                flex-direction: row !important;
                align-items: flex-start !important;
                margin-bottom: 4px !important;
            }
            .input-group label {
                width: 180px;
                min-width: 180px;
                margin-bottom: 0 !important;
                color: #000 !important;
                font-size: 10pt;
                padding-top: 2px;
            }
            .flex-row { justify-content: flex-start !important; gap: 5px !important; }
            input, select, textarea {
                flex: 0 0 auto !important;
                width: auto !important;
                min-width: 30px;
                border: none !important;
                border-bottom: 1px dashed #666 !important;
                border-radius: 0 !important;
                background: transparent !important;
                padding: 0 5px !important;
                text-align: center;
                appearance: none !important;
                -webkit-appearance: none !important;
                font-weight: bold;
                color: #000 !important;
                font-size: 11pt;
            }
            textarea { min-height: 1.2em !important; }
            .photo-preview {
                max-height: 120px !important;
                border: 1px solid #999 !important;
                background-color: transparent !important;
                margin-top: 5px !important;
                cursor: default !important;
                display: block !important;
            }
            ::-webkit-input-placeholder { color: transparent !important; }
            select.is-empty-print { color: transparent !important; }
            .print-text-wrap {
                flex: 1;
                border-bottom: 1px dashed #666;
                white-space: pre-wrap;
                word-break: break-word;
                overflow-wrap: anywhere;
                padding: 2px 5px;
                font-weight: bold;
                color: #000;
                font-size: 11pt;
                min-height: 1.2em;
                text-align: left;
            }
            .print-tab-title {
                font-size: 14pt;
                font-weight: bold;
                border-bottom: 2px solid #000;
                padding-bottom: 5px;
                margin: 20px 0 10px 0;
            }
        }
    </style>
</head>
<body>
<header>
    舞台リンクメモ<span class="version-text">v0.4.2</span>
    <button class="header-reset-btn" onclick="resetData()">全消去</button>
</header>

<div class="container" id="main-content">
    <div class="card title-card">
        <div class="card-header"><span>📝 公演タイトル（共通）</span></div>
        <div class="input-group">
            <input type="text" id="event-title" placeholder="例: ○○ツアー2026 東京公演" onchange="saveData()">
        </div>
    </div>

    <div class="card storage-status-card" id="storage-status-card">
        <div class="card-header"><span>💾 写真保存の状態</span></div>
        <div class="status-text" id="storage-status-text">確認中...</div>
    </div>

    <div id="tabs-container" class="tab-container"></div>
    <div id="app"></div>

    <div class="button-group">
        <button class="add-btn btn-primary" onclick="addCard()">＋ 新しい記録を追加</button>
        <button class="add-btn btn-secondary" onclick="addSimilarCard()">＋ 同系統の記録を追加（連番）</button>
    </div>
</div>

<div class="floating-btn-container">
    <button class="floating-btn zip-btn" onclick="exportZIP()">📦 ZIP保存<br><span style="font-size:0.65rem;">(全タブ・写真あり)</span></button>
    <button class="floating-btn cad-btn" onclick="openCADModal()">📐 CAD用<br><span style="font-size:0.65rem;">(全タブ・設定可)</span></button>
    <button class="floating-btn pdf-btn" onclick="exportPDF()">📄 PDF<br><span style="font-size:0.65rem;">(全タブ一括印刷)</span></button>
</div>

<div id="loading-overlay">処理中...⏳<br>しばらくお待ちください</div>

<div id="image-modal" class="image-modal" onclick="closeImageModal()">
    <span class="image-modal-close">&times;</span>
    <img class="image-modal-content" id="modal-img">
</div>

<div id="cad-modal" class="cad-modal">
    <div class="cad-modal-box">
        <div class="cad-modal-title">📐 CAD書き出し設定</div>
        <p class="muted">図面上に座標と一緒に表示させるテキストを選んでください。</p>
        <div class="cad-checkbox-group">
            <label><input type="checkbox" id="cad-chk-tab" checked> タブ名（シーン名）</label>
            <label><input type="checkbox" id="cad-chk-title"> 公演タイトル</label>
            <label><input type="checkbox" id="cad-chk-id" checked> 記録ID</label>
            <label><input type="checkbox" id="cad-chk-name" checked> 対象名</label>
            <label><input type="checkbox" id="cad-chk-note"> 備考（メモ）</label>
        </div>
        <div class="cad-modal-buttons">
            <button class="cad-btn-cancel" onclick="closeCADModal()">キャンセル</button>
            <button class="cad-btn-exec" onclick="executeCADExport()">書き出し実行</button>
        </div>
    </div>
</div>

<script>
const recordTypes = {
    "CM250": 12, "CM500": 12, "SL": 11,
    "出演者": 100, "小道具": 100, "大道具": 100,
    "吊物": 100, "照明": 100, "音響": 100, "映像": 100,
    "特殊効果": 100, "衣裳": 100, "その他": 100
};

const SAVE_KEY = 'stageLinkMemoSaveData_v042';
const LEGACY_SAVE_KEYS = ['stageLinkMemoSaveData_v041', 'bamiriAppSaveData_v023', 'bamiriAppSaveData_v022', 'bamiriAppSaveData_v021'];
const PHOTO_KEY_PREFIX = 'stageLinkMemoPhoto_v042_';
const LEGACY_PHOTO_PREFIXES = ['stageLinkMemoPhoto_v041_', 'bamiriPhoto_v028_'];
const LEGACY_PHOTO_DB_KEYS = ['bamiriAppPhotosDB_v023', 'bamiriAppPhotosDB_v022', 'bamiriAppPhotosDB_v021'];
const MAX_RECORD_PHOTOS = 3;
window.appPhotos = {};

let appData = {
    eventTitle: "",
    tabs: [{ id: generateId(), name: "シーン1", basePointDesc: "", cards: [] }],
    activeTabId: null
};
let storagePersistenceGranted = null;
let photoStoreHealth = null;

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}
function escapeHtml(value) {
    return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function sanitizeFileName(name) {
    if (!name) return "";
    return String(name).replace(/[\\/:*?"<>|]/g, '_').replace(/[\x00-\x1F\x7F]/g, '').trim();
}
function sanitizeCADText(value) {
    return String(value ?? '').replace(/[\r\n\t]+/g,' ').replace(/'/g,'').replace(/[\x00-\x1F\x7F]/g,' ').replace(/\s+/g,' ').trim();
}
function escapeCSV(val) {
    if (!val && val !== 0) return "";
    let str = String(val).replace(/[\r\n]+/g, ' ');
    if (/^[=+\-@]/.test(str)) str = "'" + str;
    return `"${str.replace(/"/g, '""')}"`;
}
function openImageModal(imgSrc) {
    document.getElementById('modal-img').src = imgSrc;
    document.getElementById('image-modal').style.display = 'flex';
}
function closeImageModal() {
    document.getElementById('image-modal').style.display = 'none';
    document.getElementById('modal-img').src = '';
}
function openCADModal() { document.getElementById('cad-modal').style.display = 'flex'; }
function closeCADModal() { document.getElementById('cad-modal').style.display = 'none'; }

function getFileNamePrefix() {
    const title = sanitizeFileName(appData.eventTitle || '舞台リンクメモ');
    return title || '舞台リンクメモ';
}
function isDirectLocalOpen() {
    return location.protocol === 'file:' || location.protocol === 'content:';
}
function getPhotoStorageKey(id) {
    return `${PHOTO_KEY_PREFIX}${id}`;
}
function getLegacyPhotoKeys(id) {
    return LEGACY_PHOTO_PREFIXES.map(prefix => `${prefix}${id}`);
}
function getActiveTab() {
    return appData.tabs.find(t => t.id === appData.activeTabId);
}
function getCardById(cardId) {
    return getActiveTab()?.cards.find(c => c.id === cardId);
}
function normalizePhotoEntries(card) {
    if (!Array.isArray(card.photos)) card.photos = [];
    card.photos = card.photos.filter(Boolean).map(p => typeof p === 'string' ? { id: p } : p);
}
function composeRecordId(card) {
    if (card.typeVal === 'custom') return card.customVal || '';
    return (card.typeVal && card.numVal) ? `${card.typeVal}ー${card.numVal}` : '';
}
function composeSavedRecordId(tab, card) {
    const shortId = composeRecordId(card);
    return shortId ? `${tab.name}_${shortId}` : '';
}
function collectPhotoIds(data = appData) {
    const ids = [];
    if (!data || !Array.isArray(data.tabs)) return ids;
    data.tabs.forEach(tab => {
        ids.push(`base-${tab.id}`);
        (tab.cards || []).forEach(card => {
            normalizePhotoEntries(card);
            card.photos.forEach(p => ids.push(p.id));
        });
    });
    return ids;
}
async function loadPhotoFromStore(id) {
    if (window.appPhotos[id]) return window.appPhotos[id];
    if (typeof localforage === 'undefined') return null;
    try {
        let data = await localforage.getItem(getPhotoStorageKey(id));
        if (!data) {
            for (const legacyKey of getLegacyPhotoKeys(id)) {
                data = await localforage.getItem(legacyKey);
                if (data) {
                    await localforage.setItem(getPhotoStorageKey(id), data);
                    break;
                }
            }
        }

async function checkPhotoStoreHealth() {
    if (typeof localforage === 'undefined') {
        photoStoreHealth = false;
        return false;
    }
    const probeKey = `${PHOTO_KEY_PREFIX}__probe__`;
    try {
        await localforage.setItem(probeKey, 'ok');
        const result = await localforage.getItem(probeKey);
        await localforage.removeItem(probeKey);
        photoStoreHealth = result === 'ok';
        return photoStoreHealth;
    } catch (e) {
        console.error('写真保存領域確認失敗:', e);
        photoStoreHealth = false;
        return false;
    }
}
async function requestPersistentStorage() {
    if (!navigator.storage || !navigator.storage.persist) {
        storagePersistenceGranted = null;
        return null;
    }
    try {
        storagePersistenceGranted = await navigator.storage.persist();
        return storagePersistenceGranted;
    } catch (e) {
        console.error('永続保存要求失敗:', e);
        storagePersistenceGranted = null;
        return null;
    }
}
function updateStorageStatus(extraMessage = '') {
    const card = document.getElementById('storage-status-card');
    const text = document.getElementById('storage-status-text');
    if (!card || !text) return;
    card.classList.remove('warn', 'error');

    const messages = [];
    let level = 'ok';
    if (extraMessage) messages.push(extraMessage);

    if (isDirectLocalOpen()) {
        messages.push('このHTMLを端末内から直接開いています。写真保存は不安定な場合がありますが、写真撮影自体は続けて試せます。');
        level = 'warn';
    } else {
        messages.push('HTTPSで開いていればホーム画面追加やオフライン起動が使いやすくなります。');
    }
    messages.push(`現在の写真: ${countLoadedPhotos()}枚`);

    if (photoStoreHealth === true) {
        messages.push('写真保存領域: 利用可能');
    } else if (photoStoreHealth === false) {
        messages.push('写真保存領域: 利用できません');
        level = 'error';
    } else {
        messages.push('写真保存領域: 未確認');
        if (level !== 'error') level = 'warn';
    }

    if (storagePersistenceGranted === true) {
        messages.push('保存保持: 要求済み');
    } else if (storagePersistenceGranted === false) {
        messages.push('保存保持: 未許可');
        if (level === 'ok') level = 'warn';
    } else {
        messages.push('保存保持: ブラウザ依存');
    }

    if (level === 'warn') card.classList.add('warn');
    if (level === 'error') card.classList.add('error');
    text.textContent = messages.join('\n');
}
async function migrateLegacyPhotosIfNeeded() {
    if (typeof localforage === 'undefined') return;
    let legacyPhotos = null;
    for (const key of LEGACY_PHOTO_DB_KEYS) {
        try {
            const candidate = await localforage.getItem(key);
            if (candidate && typeof candidate === 'object') {
                legacyPhotos = candidate;
                break;
            }
        } catch (e) {}
    }
    if (!legacyPhotos) return;
    const normalized = { ...legacyPhotos };
    if (normalized['base'] && appData.tabs[0] && !normalized[`base-${appData.tabs[0].id}`]) {
        normalized[`base-${appData.tabs[0].id}`] = normalized['base'];
    }
    delete normalized['base'];

    for (const [id, data] of Object.entries(normalized)) {
        if (typeof data !== 'string' || !data.startsWith('data:image/')) continue;
        const existing = await localforage.getItem(getPhotoStorageKey(id));
        if (!existing) await localforage.setItem(getPhotoStorageKey(id), data);
        window.appPhotos[id] = data;
    }
}
function normalizeAppData(data) {
    if (!data || !Array.isArray(data.tabs) || !data.tabs.length) {
        return {
            eventTitle: "",
            tabs: [{ id: generateId(), name: "シーン1", basePointDesc: "", cards: [createEmptyCardData()] }],
            activeTabId: null
        };

    data.tabs.forEach(tab => {
        if (typeof tab.basePointDesc !== 'string') tab.basePointDesc = '';
        if (!Array.isArray(tab.cards)) tab.cards = [];
        tab.cards.forEach(card => {
            if (typeof card.useCoordinates !== 'boolean') card.useCoordinates = false;

function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
        try {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error('写真ファイルの読み込みに失敗しました。'));
            reader.onabort = () => reject(new Error('写真ファイルの読み込みが中断されました。'));
            reader.readAsDataURL(file);
        } catch (e) {
            reject(e);
        }
    });
}
function compressImage(file, maxWidth, maxHeight, quality) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                let width = img.width;
                let height = img.height;
                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                if (!ctx) return resolve(null);
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = () => resolve(null);
            img.src = event.target.result;
        };
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
    });
}
async function handleBasePhoto(event, id) {
    const file = event.target.files[0];
    if (!file) return;
    const cameraBtn = document.getElementById(`cameraBtn-${id}`);
    const preview = document.getElementById(`preview-${id}`);
    const delBtn = document.getElementById(`deletePhotoBtn-${id}`);
    if (cameraBtn) cameraBtn.innerHTML = '⏳ 写真を処理中...';

    try {
        const rawData = await fileToDataURL(file);
        const compressedData = await compressImage(file, 1200, 1200, 0.7);
        const dataToStore = (compressedData && compressedData.length < rawData.length) ? compressedData : rawData;
        const saved = await savePhotoToStore(id, dataToStore);

        if (preview) {
            preview.src = dataToStore;
            preview.style.display = 'block';
        }
        if (delBtn) delBtn.style.display = 'block';
        if (cameraBtn) {
            cameraBtn.classList.add('has-photo');
            cameraBtn.innerHTML = saved ? '✅ 写真撮影済み（タップで撮り直し）' : '⚠️ 一時表示中（保存未完了）';
        }
        saveData();
        updateStorageStatus(saved ? '写真を保存しました。' : '写真は画面表示のみで、保存が完了していません。');
    } catch (error) {
        console.error(error);
        if (cameraBtn) {
            cameraBtn.classList.remove('has-photo');
            cameraBtn.innerHTML = '📷 基準点の写真を選択/撮影';
        }
        alert('写真の読み込みに失敗しました。');
    } finally {
        event.target.value = '';
    }
}
async function handleRecordPhoto(event, cardId) {
    const file = event.target.files[0];
    if (!file) return;
    const card = getCardById(cardId);
    if (!card) return;

    normalizePhotoEntries(card);
    if (card.photos.length >= MAX_RECORD_PHOTOS) {
        alert(`写真は1件につき${MAX_RECORD_PHOTOS}枚までです。`);
        event.target.value = '';
        return;
    }

    try {
        const rawData = await fileToDataURL(file);
        const compressedData = await compressImage(file, 1200, 1200, 0.7);
        const dataToStore = (compressedData && compressedData.length < rawData.length) ? compressedData : rawData;

        const photoId = `${cardId}_photo_${Date.now()}`;
        const saved = await savePhotoToStore(photoId, dataToStore);
        if (!saved) {
            alert('写真の保存に失敗しました。');
            event.target.value = '';
            return;
        }

        card.photos.push({ id: photoId });
        saveData();
        renderCards();
        updateStorageStatus('写真を保存しました。');
    } catch (error) {
        console.error(error);
        alert('写真の読み込みに失敗しました。');
    } finally {
        event.target.value = '';
    }
}
async function removeRecordPhoto(cardId, photoId) {
    if (!confirm('この写真を削除しますか？')) return;
    const card = getCardById(cardId);
    if (!card) return;
    normalizePhotoEntries(card);
    card.photos = card.photos.filter(p => p.id !== photoId);
    await removePhotoFromStore(photoId);

    renderCards();
    updateStorageStatus('写真を削除しました。');

async function resetData() {

    localStorage.removeItem(SAVE_KEY);
    if (typeof localforage !== 'undefined') {
        for (const id of collectPhotoIds(appData)) await removePhotoFromStore(id);
        for (const key of LEGACY_PHOTO_DB_KEYS) {
            try { await localforage.removeItem(key); } catch(e) {}
        }

    location.reload();

async function loadData() {
    let saved = localStorage.getItem(SAVE_KEY);
    if (!saved) {
        for (const key of LEGACY_SAVE_KEYS) {
            const oldSaved = localStorage.getItem(key);
            if (!oldSaved) continue;
            try {
                appData = normalizeAppData(JSON.parse(oldSaved));
                break;
            } catch (e) {}
        }
        if (!appData.activeTabId) {
            appData = normalizeAppData(appData);
        }
    } else {
        appData = normalizeAppData(JSON.parse(saved));
    }
    if (getActiveTab()?.cards.length === 0) getActiveTab().cards.push(createEmptyCardData());
    document.getElementById('event-title').value = appData.eventTitle || '';

    if (typeof localforage !== 'undefined') {
        try {
            await migrateLegacyPhotosIfNeeded();
            await preloadAllPhotos();
            await checkPhotoStoreHealth();
            await requestPersistentStorage();
        } catch (e) {
            console.error('写真復元エラー', e);
            photoStoreHealth = false;
        }
    } else {
        photoStoreHealth = false;
    }

    renderTabs();
    renderCards();
    updateStorageStatus();

    if (isDirectLocalOpen() && !sessionStorage.getItem('stage_link_memo_warning_shown')) {
        sessionStorage.setItem('stage_link_memo_warning_shown', '1');
        alert('このHTMLを端末内から直接開いているため、写真保存は不安定です。\n重要な写真は作業後すぐにZIP保存してください。');
    }
}

async function deleteTab(tabId) {

    const tab = appData.tabs.find(t => t.id === tabId);
    if (!confirm(`タブ「${tab.name}」とその中のデータをすべて削除しますか？`)) return;

        <div class="input-group">
            <label>対象名</label>
            <input type="text" id="name-${card.id}" placeholder="対象名を入力" value="${escapeHtml(card.name || '')}" onchange="saveData()" ${card.isLocked ? 'disabled' : ''}>
        </div>

        <details class="disclosure" ${card.useCoordinates ? 'open' : ''}>
            <summary>座標を追加する</summary>
            <div class="disclosure-body">
                <div class="input-group">
                    <label class="toggle-row">
                        <input type="checkbox" id="useCoordinates-${card.id}" ${card.useCoordinates ? 'checked' : ''} ${card.isLocked ? 'disabled' : ''}>
                        <span>この記録に座標を付ける</span>
                    </label>
                </div>
                <div id="coordArea-${card.id}" style="display:${card.useCoordinates ? 'block' : 'none'};">
                    <div class="input-group">
                        <label>X距離（基本は舞台センターから）</label>
                        <div class="flex-row">
                            <select id="dirX-${card.id}" onchange="toggleDistX('${card.id}'); saveData();" ${card.isLocked ? 'disabled' : ''}>
                                <option value="" ${card.dirX === '' ? 'selected' : ''}>選択</option>
                                <option value="上手" ${card.dirX === '上手' ? 'selected' : ''}>上手</option>
                                <option value="下手" ${card.dirX === '下手' ? 'selected' : ''}>下手</option>
                                <option value="センター" ${card.dirX === 'センター' ? 'selected' : ''}>センター</option>
                            </select>
                            <span class="unit dist-x-parts-${card.id}" style="display:${card.dirX === 'センター' ? 'none' : ''}">へ</span>
                            <input type="number" id="distX-${card.id}" class="dist-x-parts-${card.id}" style="display:${card.dirX === 'センター' ? 'none' : 'block'}" placeholder="0" value="${escapeHtml(card.distX || '')}" onchange="saveData()" ${card.isLocked ? 'disabled' : ''}>
                            <span class="unit dist-x-parts-${card.id}" style="display:${card.dirX === 'センター' ? 'none' : ''}">mm</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Y距離（基本は舞台前から）</label>
                        <div class="flex-row">
                            <select id="dirY-${card.id}" onchange="saveData()" ${card.isLocked ? 'disabled' : ''}>
                                <option value="奥" ${card.dirY === '奥' || card.dirY === '' ? 'selected' : ''}>奥</option>
                                <option value="前" ${card.dirY === '前' ? 'selected' : ''}>前</option>
                            </select>
                            <span class="unit">へ</span>
                            <input type="number" id="distY-${card.id}" placeholder="0" value="${escapeHtml(card.distY || '')}" onchange="saveData()" ${card.isLocked ? 'disabled' : ''}>
                            <span class="unit">mm</span>
                        </div>
                    </div>
                </div>
            </div>
        </details>

        <div class="input-group">
            <label>備考</label>
            <textarea id="note-${card.id}" placeholder="メモ" onchange="saveData()" ${card.isLocked ? 'disabled' : ''}>${escapeHtml(card.note || '')}</textarea>
        </div>

        <div class="input-group">
            <label>記録写真（最大${MAX_RECORD_PHOTOS}枚）</label>
            <input type="file" accept="image/*" capture="environment" id="photo-${card.id}" style="display:none;" ${card.isLocked ? 'disabled' : ''}>
            <button type="button" class="camera-btn ${photoCount > 0 ? 'has-photo' : ''}" id="cameraBtn-${card.id}" ${card.isLocked ? 'disabled' : ''}>📷 記録写真を追加</button>
            <span class="help-text">全景・寄り・別角度などを1件にまとめて保存できます。現在 ${photoCount} / ${MAX_RECORD_PHOTOS} 枚です。</span>
            <div class="photo-grid" id="photoList-${card.id}"></div>
        </div>

        <div class="record-actions">
            <button type="button" class="lock-btn ${card.isLocked ? 'locked-state' : ''}" onclick="toggleLock('${card.id}')">${card.isLocked ? '🔒 ロック解除' : '🔓 ロック'}</button>
            <button type="button" class="delete-btn" onclick="removeCard('${card.id}')" ${card.isLocked ? 'disabled' : ''}>削除</button>
        </div>
    `;

    const fileInput = div.querySelector(`#photo-${card.id}`);
    const camBtn = div.querySelector(`#cameraBtn-${card.id}`);
    const useCoordInput = div.querySelector(`#useCoordinates-${card.id}`);
    const coordArea = div.querySelector(`#coordArea-${card.id}`);

    fileInput.onchange = (event) => handleRecordPhoto(event, card.id);
    camBtn.onclick = () => fileInput.click();
    useCoordInput.onchange = () => {
        coordArea.style.display = useCoordInput.checked ? 'block' : 'none';
        if (!useCoordInput.checked) {
            const distX = div.querySelector(`#distX-${card.id}`);
            const distY = div.querySelector(`#distY-${card.id}`);
            const dirX = div.querySelector(`#dirX-${card.id}`);
            const dirY = div.querySelector(`#dirY-${card.id}`);
            if (distX) distX.value = '';
            if (distY) distY.value = '';
            if (dirX) dirX.value = '';
            if (dirY) dirY.value = '奥';
            toggleDistX(card.id);
        }
        saveData();
    };

    setTimeout(async () => {
        const photoList = div.querySelector(`#photoList-${card.id}`);
        for (const p of card.photos) {
            const data = await loadPhotoFromStore(p.id);
            if (!data) continue;

            const wrap = document.createElement('div');
            wrap.className = 'photo-item';

            const img = document.createElement('img');
            img.src = data;
            img.className = 'photo-preview';
            img.style.display = 'block';
            img.alt = '記録写真';
            img.onclick = () => openImageModal(data);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'photo-delete-btn';
            btn.textContent = '🗑️ この写真を削除';
            btn.disabled = card.isLocked;
            btn.onclick = () => removeRecordPhoto(card.id, p.id);

            wrap.appendChild(img);
            wrap.appendChild(btn);
            photoList.appendChild(wrap);
        }
    }, 0);

    return div;
}
function addCard(prefillType = "", prefillNum = "") {
    syncDOMtoData();
    const activeTab = getActiveTab();
    if (!activeTab) return;
    activeTab.cards.push(createEmptyCardData(prefillType, prefillNum));
    renderCards();
    saveData();
    updateStorageStatus();
}
function addSimilarCard() {
    syncDOMtoData();
    const activeTab = getActiveTab();
    if (!activeTab || activeTab.cards.length === 0) { addCard(); return; }

    const lastCard = activeTab.cards[activeTab.cards.length - 1];
    if (!lastCard.typeVal || lastCard.typeVal === "custom") { addCard(lastCard.typeVal); return; }

    let nextNumInt = 1;
    if (lastCard.numVal) nextNumInt = parseInt(lastCard.numVal, 10) + 1;

    const maxNum = recordTypes[lastCard.typeVal];
    if (nextNumInt > maxNum) {
        alert(`${lastCard.typeVal}は${maxNum}番までです。新しい枠のみ追加します。`);
        addCard(lastCard.typeVal);
    } else {
        const nextNumStr = String(nextNumInt).padStart(2, '0');
        addCard(lastCard.typeVal, nextNumStr);
    }
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 50);
}
function toggleLock(id) {
    syncDOMtoData();
    const card = getCardById(id);
    if (!card) return;
    card.isLocked = !card.isLocked;
    renderCards();
    saveData();
}
async function removeCard(id) {
    syncDOMtoData();
    const activeTab = getActiveTab();
    if (!activeTab) return;
    const card = activeTab.cards.find(c => c.id === id);
    if (card) {
        normalizePhotoEntries(card);
        for (const p of card.photos) await removePhotoFromStore(p.id);
    }
    activeTab.cards = activeTab.cards.filter(c => c.id !== id);
    renderCards();
    saveData();
    updateStorageStatus('記録と関連写真を削除しました。');
}
async function removePhoto(id) {
    if (!confirm("撮影した写真を削除しますか？")) return;
    await removePhotoFromStore(id);
    const preview = document.getElementById(`preview-${id}`);
    if (preview) { preview.src = ""; preview.style.display = 'none'; }
    const deleteBtn = document.getElementById(`deletePhotoBtn-${id}`);
    if (deleteBtn) deleteBtn.style.display = 'none';
    const cameraBtn = document.getElementById(`cameraBtn-${id}`);
    if (cameraBtn) {
        cameraBtn.classList.remove('has-photo');
        cameraBtn.textContent = '📷 基準点の写真を選択/撮影';
    }
    const fileInput = document.getElementById(`photo-${id}`);
    if (fileInput) fileInput.value = '';
    saveData();
    updateStorageStatus('写真を削除しました。');
}
function validateDuplicateIds() {
    const activeTab = getActiveTab();
    if (!activeTab) return null;
    const seen = new Map();
    for (const card of activeTab.cards) {
        const shortId = composeRecordId(card);
        if (!shortId) continue;
        const key = shortId;
        if (seen.has(key)) return key;
        seen.set(key, true);
    }
    return null;
}
async function exportZIP() {
    if (typeof JSZip === 'undefined') {
        alert('ZIP保存に必要なライブラリの読み込みに失敗しました。');
        return;
    }
    syncDOMtoData();
    await preloadAllPhotos();

    const dup = validateDuplicateIds();
    if (dup) {
        const proceed = confirm(`同じタブ内で同じ記録ID「${dup}」があります。\n保存時にはタブ名付きIDになりますが、続けますか？`);
        if (!proceed) return;
    }

    let hasAnyData = false;
    appData.tabs.forEach(t => {
        if (t.cards.length > 0 || t.basePointDesc || window.appPhotos[`base-${t.id}`]) hasAnyData = true;
    });
    if (!hasAnyData) {
        alert("データがありません。");
        return;
    }

    const overlay = document.getElementById('loading-overlay');
    overlay.innerHTML = 'ZIPデータをまとめています...📦<br>しばらくお待ちください';
    overlay.style.display = 'flex';

    try {
        const zip = new JSZip();
        let csvContent = "\uFEFF";
        const fileNamePrefix = getFileNamePrefix();

        if (appData.eventTitle) csvContent += `公演タイトル,${escapeCSV(appData.eventTitle)}\n\n`;
        csvContent += 'タブ名(シーン),保存時記録ID,項目ID,対象名,"X方向\n(上手/下手)",,X距離,,"Y方向\n(前/奥)",,Y距離,,備考,\n';

        for (const tab of appData.tabs) {
            const baseId = `base-${tab.id}`;
            let basePhotoName = "";
            if (window.appPhotos[baseId]) {
                basePhotoName = sanitizeFileName(`${tab.name}_基準点.jpg`);
                zip.file(basePhotoName, window.appPhotos[baseId].split(',')[1], { base64: true });
            }
            const baseNote = tab.basePointDesc || "";
            const baseRow = [tab.name, `${tab.name}_基準点`, '📍基準点', '', '', '', '', '', '', '', '', basePhotoName ? `${baseNote}${baseNote ? ' ' : ''}(写真: ${basePhotoName})` : baseNote];
            csvContent += baseRow.map(escapeCSV).join(",") + "\n";

            for (const card of tab.cards) {
                normalizePhotoEntries(card);
                const shortId = composeRecordId(card);
                const savedId = composeSavedRecordId(tab, card);
                const safeFileNameId = sanitizeFileName(savedId) || `未設定_${card.id}`;

                const photoNames = [];
                for (let i = 0; i < card.photos.length; i++) {
                    const p = card.photos[i];
                    const data = window.appPhotos[p.id] || await loadPhotoFromStore(p.id);
                    if (!data) continue;
                    const photoFileName = sanitizeFileName(`${safeFileNameId}_${i + 1}.jpg`);
                    zip.file(photoFileName, data.split(',')[1], { base64: true });
                    photoNames.push(photoFileName);
                }

                let outHeX = "へ", outDistX = card.distX, outMmX = "mm";
                let outDirX = card.dirX, outDirY = card.dirY, outDistY = card.distY, outHeY = "へ", outMmY = "mm";
                if (!card.useCoordinates) {
                    outDirX = ""; outHeX = ""; outDistX = ""; outMmX = "";
                    outDirY = ""; outHeY = ""; outDistY = ""; outMmY = "";
                } else if (card.dirX === "センター") {
                    outHeX = ""; outDistX = ""; outMmX = "";
                }

                const outNote = photoNames.length ? `${card.note || ''}${card.note ? ' ' : ''}(写真: ${photoNames.join(' / ')})` : (card.note || '');
                const row = [tab.name, savedId, shortId, card.name, outDirX, outHeX, outDistX, outMmX, outDirY, outHeY, outDistY, outMmY, outNote];
                csvContent += row.map(escapeCSV).join(",") + "\n";
            }
        }

        zip.file(`${fileNamePrefix}_全リスト.csv`, csvContent);
        const content = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(content);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${fileNamePrefix}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (error) {
        console.error(error);
        alert("保存中にエラーが発生しました。\n" + error.message);
    } finally {
        overlay.style.display = 'none';
    }
}
function executeCADExport() {
    closeCADModal();
    syncDOMtoData();

    const incTab = document.getElementById('cad-chk-tab').checked;
    const incTitle = document.getElementById('cad-chk-title').checked;
    const incId = document.getElementById('cad-chk-id').checked;
    const incName = document.getElementById('cad-chk-name').checked;
    const incNote = document.getElementById('cad-chk-note').checked;
    const eventTitle = sanitizeCADText(appData.eventTitle);

    let vsContent = "PROCEDURE ImportStageLinkMemo;\nBEGIN\n";

    appData.tabs.forEach(tab => {
        const safeTabName = sanitizeCADText(tab.name);
        tab.cards.forEach(card => {
            const shortId = composeRecordId(card);
            const savedId = `${tab.name}_${shortId}`;
            let x = 0, y = 0;
            if (card.useCoordinates) {
                if (card.dirX === "上手") x = Number(card.distX) || 0;
                else if (card.dirX === "下手") x = -(Number(card.distX) || 0);
                if (card.dirY === "奥") y = Number(card.distY) || 0;
                else if (card.dirY === "前") y = -(Number(card.distY) || 0);
            }

            const safeName = sanitizeCADText(card.name || "");
            const safeId = sanitizeCADText(savedId);
            const safeNote = sanitizeCADText(card.note || "");

            const labelParts = [];
            if (incTab && safeTabName) labelParts.push(safeTabName);
            if (incTitle && eventTitle) labelParts.push(eventTitle);
            if (incId && safeId) labelParts.push(safeId);
            if (incName && safeName) labelParts.push(safeName);
            if (incNote && safeNote) labelParts.push(safeNote);

            const labelText = labelParts.join(' : ');
            vsContent += `  Locus(${x}, ${y});\n`;
            if (labelText) {
                vsContent += `  TextOrigin(${x + 100}, ${y + 100});\n  CreateText('${labelText}');\n`;
            }
        });
    });

    vsContent += "END;\nRun(ImportStageLinkMemo);\n";

    const blob = new Blob([vsContent], { type: 'text/plain;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `${getFileNamePrefix()}_VWスクリプト.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function exportPDF() {
    syncDOMtoData();
    const originalTitle = document.title;
    document.title = getFileNamePrefix();
    window.print();
    setTimeout(() => { document.title = originalTitle; }, 1000);
}
window.onload = loadData;
async function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    if (!(location.protocol === 'https:' || location.hostname === 'localhost')) return;
    try {
        await navigator.serviceWorker.register('./sw.js');
    } catch (e) {
        console.error('Service Worker registration failed:', e);
    }
}
window.addEventListener('load', registerServiceWorker);
