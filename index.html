<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>舞台リンクメモ</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1d4f91">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="舞台リンクメモ">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --surface-subtle: #eef4ff;
            --text: #223045;
            --muted: #5d6b82;
            --line: #d4dce8;
            --line-strong: #9fb0c8;
            --primary: #1d4f91;
            --primary-dark: #173f73;
            --success: #177245;
            --warning: #b7791f;
            --danger: #c0392b;
            --purple: #7d4ab0;
            --shadow: 0 2px 8px rgba(16, 24, 40, 0.08);
            --radius: 10px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 14px 16px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .version-text {
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.9;
            margin-left: 6px;
        }
        .header-reset-btn {
            position: absolute;
            right: 12px;
            top: 10px;
            background: white;
            color: var(--danger);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
        }
        .container {
            padding: 12px;
            padding-bottom: 132px;
            max-width: 860px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
        }
        .title-card, .base-point-card, .storage-status-card {
            background: var(--surface-subtle);
        }
        .storage-status-card.warn { border-color: #e3b341; }
        .storage-status-card.error { border-color: #d92d20; }
        .card-header {
            font-weight: 700;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .status-text {
            font-size: 0.92rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--muted);
        }
        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 0.92rem;
            color: var(--text);
            margin-bottom: 6px;
            font-weight: 700;
        }
        .help-text {
            font-size: 0.84rem;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
        }
        .flex-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .type-row {
            display: grid;
            grid-template-columns: 1.3fr 0.85fr;
            gap: 10px;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
            color: var(--text);
        }
        textarea { min-height: 86px; resize: vertical; }
        input:disabled, select:disabled, button:disabled, textarea:disabled {
            background: #eef2f6;
            color: #667085;
            opacity: 1;
            -webkit-text-fill-color: #667085;
        }
        .unit { font-size: 0.92rem; color: var(--muted); white-space: nowrap; }

        .header-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .delete-btn, .lock-btn, .action-btn {
            color: white;
            border: none;
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 0.84rem;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 700;
        }
        .delete-btn { background-color: var(--danger); }
        .lock-btn { background-color: #667085; }
        .lock-btn.locked-state { background-color: var(--warning); }
        .action-btn { background-color: var(--primary); }

        .camera-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 11px 14px;
            font-size: 0.96rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .camera-btn.has-photo { background-color: var(--success); }

        .photo-preview {
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            border: 1px solid var(--line);
            background: #000;
            cursor: pointer;
        }
        .photo-delete-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid #e4b1ab;
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: white;
        }

        .tab-container {
            display: flex;
            overflow-x: auto;
            background-color: #e1e7f0;
            padding: 10px 10px 0;
            border-radius: 10px 10px 0 0;
            margin-bottom: 15px;
            gap: 6px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 12px 15px;
            background-color: #cfd8e6;
            color: #1e293b;
            border-radius: 10px 10px 0 0;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }
        .tab-edit-icon, .tab-delete-icon { font-size: 0.92rem; cursor: pointer; opacity: 0.9; }
        .tab-add-btn {
            padding: 12px 15px;
            background-color: #edf4ff;
            color: var(--primary);
            border-radius: 10px 10px 0 0;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid #c4d4ea;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .add-btn {
            color: white;
            border: none;
            border-radius: 999px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        .btn-primary { background-color: var(--primary); }
        .btn-secondary { background-color: var(--success); }

        .floating-btn-container {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            width: calc(100% - 16px);
            max-width: 720px;
            z-index: 100;
        }
        .floating-btn {
            flex: 1;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 12px 0;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(16,24,40,0.18);
            cursor: pointer;
            line-height: 1.3;
        }
        .zip-btn { background-color: var(--success); }
        .cad-btn { background-color: var(--purple); }
        .pdf-btn { background-color: var(--danger); }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.72);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        .image-modal, .cad-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(15,23,42,0.88);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .cad-modal { background-color: rgba(15,23,42,0.65); }
        .image-modal-content {
            max-width: 95%;
            max-height: 90%;
            border-radius: 8px;
            object-fit: contain;
        }
        .image-modal-close {
            position: absolute;
            top: 15px;
            right: 25px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2001;
        }

        .cad-modal-box {
            background-color: #fff;
            padding: 20px;
            border-radius: 14px;
            width: 92%;
            max-width: 380px;
            border: 1px solid var(--line);
        }
        .cad-modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
            color: var(--primary);
        }
        .cad-checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .cad-checkbox-group label {
            display: flex;
            align-items: center;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
        }
        .cad-checkbox-group input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 10px;
        }
        .cad-modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .cad-btn-cancel, .cad-btn-exec {
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
        }
        .cad-btn-cancel { background: #e5e7eb; color: var(--text); }
        .cad-btn-exec { background: var(--primary); color: white; }

        details.disclosure {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            padding: 0;
            margin-bottom: 12px;
            overflow: hidden;
        }
        details.disclosure summary {
            list-style: none;
            cursor: pointer;
            padding: 12px 14px;
            font-weight: 700;
            color: var(--primary);
            background: #f7fbff;
        }
        details.disclosure summary::-webkit-details-marker { display: none; }
        .disclosure-body {
            padding: 12px 14px 4px 14px;
            border-top: 1px solid var(--line);
        }


        .memo-preview {
            min-height: 86px;
            padding: 11px 12px;
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            line-height: 1.6;
            cursor: pointer;
        }
        .memo-preview.is-empty {
            color: var(--muted);
        }
        .memo-modal {
            display: none;
            position: fixed;
            z-index: 2100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15,23,42,0.72);
            justify-content: center;
            align-items: center;
            padding: 14px;
        }
        .memo-modal-box {
            width: 100%;
            max-width: 760px;
            max-height: 92vh;
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--line);
            box-shadow: 0 10px 30px rgba(15,23,42,0.18);
            display: flex;
            flex-direction: column;
        }
        .memo-modal-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            font-weight: 700;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .memo-modal-body {
            padding: 14px 16px;
            overflow: auto;
        }
        .memo-modal-textarea {
            width: 100%;
            min-height: 42vh;
            font-size: 1rem;
            line-height: 1.7;
        }
        .memo-modal-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .record-footer-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .record-footer-actions .lock-btn,
        .record-footer-actions .delete-btn {
            flex: 1;
        }

        @media print {
            @page { margin: 10mm; }
            body { background-color: #fff !important; color: #000 !important; font-size: 11pt; }
            header, .button-group, .floating-btn-container, .header-actions, .camera-btn, .image-modal, .photo-delete-btn, .cad-modal, .tab-container, details summary, .record-footer-actions {
                display: none !important;
            }
            details.disclosure {
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .disclosure-body {
                display: block !important;
                padding: 0 !important;
                border: none !important;
            }
            .card {
                box-shadow: none !important;
                border: 1px solid #333 !important;
                border-radius: 0 !important;
                margin-bottom: 10px !important;
                padding: 10px 15px !important;
                background-color: #fff !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
            .card-header {
                border-bottom: 2px solid #333 !important;
                padding-bottom: 5px !important;
                margin-bottom: 8px !important;
            }
            .input-group {
                display: flex !important;
                flex-direction: row !important;
                align-items: flex-start !important;
                margin-bottom: 4px !important;
            }
            .input-group label {
                width: 170px;
                min-width: 170px;
                margin-bottom: 0 !important;
                color: #000 !important;
                font-size: 10pt;
                padding-top: 2px;
            }
            .flex-row { justify-content: flex-start !important; gap: 5px !important; }
            input, select, textarea {
                flex: 0 0 auto !important;
                width: auto !important;
                min-width: 30px;
                border: none !important;
                border-bottom: 1px dashed #666 !important;
                border-radius: 0 !important;
                background: transparent !important;
                padding: 0 5px !important;
                text-align: center;
                appearance: none !important;
                -webkit-appearance: none !important;
                font-weight: bold;
                color: #000 !important;
                font-size: 11pt;
            }
            textarea { min-height: 1.2em !important; }
            .photo-preview {
                max-height: 120px !important;
                border: 1px solid #999 !important;
                background-color: transparent !important;
                margin-top: 5px !important;
                cursor: default !important;
                display: block !important;
            }
            .print-text-wrap {
                flex: 1;
                border-bottom: 1px dashed #666;
                white-space: pre-wrap;
                word-break: break-word;
                overflow-wrap: anywhere;
                padding: 2px 5px;
                font-weight: bold;
                color: #000;
                font-size: 11pt;
                min-height: 1.2em;
                text-align: left;
            }
            .print-tab-title {
                font-size: 14pt;
                font-weight: bold;
                border-bottom: 2px solid #000;
                padding-bottom: 5px;
                margin: 20px 0 10px 0;
            }
        }
    </style>
</head>
<body>

<header>
    舞台リンクメモ<span class="version-text">v0.4.9</span>
    <button class="header-reset-btn" onclick="resetData()">全消去</button>
</header>

<div class="container" id="main-content">
    <div class="card title-card">
        <div class="card-header"><span>📝 公演タイトル（共通）</span></div>
        <div class="input-group">
            <input type="text" id="event-title" placeholder="例: ○○ツアー2026 東京公演" onchange="saveData()">
        </div>
    </div>

    <div class="card storage-status-card" id="storage-status-card">
        <div class="card-header"><span>💾 写真保存の状態</span></div>
        <div class="status-text" id="storage-status-text">確認中...</div>
    </div>

    <div id="tabs-container" class="tab-container"></div>
    <div id="app"></div>

    <div class="button-group">
        <button class="add-btn btn-primary" onclick="addCard()">＋ 新しい記録を追加</button>
        <button class="add-btn btn-secondary" onclick="addSimilarCard()">＋ 同系統の記録を追加（連番）</button>
    </div>
</div>

<div class="floating-btn-container">
    <button class="floating-btn zip-btn" onclick="exportZIP()">📦 ZIP保存<br><span style="font-size:0.65rem;">(全タブ・写真あり)</span></button>
    <button class="floating-btn cad-btn" onclick="openCADModal()">📐 CAD用<br><span style="font-size:0.65rem;">(全タブ・設定可)</span></button>
    <button class="floating-btn pdf-btn" onclick="exportPDF()">📄 PDF<br><span style="font-size:0.65rem;">(全タブ一括印刷)</span></button>
</div>

<div id="loading-overlay">処理中...⏳<br>しばらくお待ちください</div>

<div id="image-modal" class="image-modal" onclick="closeImageModal()">
    <span class="image-modal-close">&times;</span>
    <img class="image-modal-content" id="modal-img">
</div>

<div id="cad-modal" class="cad-modal">
    <div class="cad-modal-box">
        <div class="cad-modal-title">📐 CAD書き出し設定</div>
        <p class="help-text" style="font-size:0.9rem; line-height:1.6;">
            図面上に座標と一緒に表示させるテキストを選んでください。
        </p>
        <div class="cad-checkbox-group">
            <label><input type="checkbox" id="cad-chk-tab" checked> タブ名（シーン名）</label>
            <label><input type="checkbox" id="cad-chk-title"> 公演タイトル</label>
            <label><input type="checkbox" id="cad-chk-id" checked> 記録ID</label>
            <label><input type="checkbox" id="cad-chk-name" checked> 対象名</label>
            <label><input type="checkbox" id="cad-chk-note"> メモ</label>
        </div>
        <div class="cad-modal-buttons">
            <button class="cad-btn-cancel" onclick="closeCADModal()">キャンセル</button>
            <button class="cad-btn-exec" onclick="executeCADExport()">書き出し実行</button>
        </div>
    </div>
</div>



<div id="memo-modal" class="memo-modal">
    <div class="memo-modal-box">
        <div class="memo-modal-header">
            <span id="memo-modal-title">メモ</span>
            <button type="button" class="cad-btn-cancel" onclick="closeMemoModal()">閉じる</button>
        </div>
        <div class="memo-modal-body">
            <textarea id="memo-modal-textarea" class="memo-modal-textarea" placeholder="メモを入力"></textarea>
            <div class="help-text">大きく表示して読みやすく、入力しやすくしています。</div>
        </div>
        <div class="memo-modal-footer">
            <button type="button" class="cad-btn-cancel" onclick="closeMemoModal()">キャンセル</button>
            <button type="button" class="cad-btn-exec" onclick="saveMemoModal()">保存</button>
        </div>
    </div>
</div>

<script>
if (!window.localforage) {
    window.localforage = {
        async getItem(key) {
            try {
                const v = localStorage.getItem(key);
                return v === null ? null : v;
            } catch (e) {
                return null;
            }
        },
        async setItem(key, value) {
            localStorage.setItem(key, value);
            return value;
        },
        async removeItem(key) {
            localStorage.removeItem(key);
        }
    };
}
</script>

<script>
const RECORD_TYPES = {
    "CM250": 12, "CM500": 12, "SL": 11,
    "出演者": 100, "小道具": 100, "大道具": 100,
    "吊物": 100, "照明": 100, "音響": 100, "映像": 100,
    "特殊効果": 100, "衣裳": 100, "その他": 100
};
const SAVE_KEY = "stageLinkMemo_v043";
const PHOTO_KEY_PREFIX = "stageLinkMemoPhoto_v043_";
const LEGACY_SAVE_KEYS = ["stageLinkMemoSaveData_v041", "bamiriAppSaveData_v023", "bamiriAppSaveData_v022", "bamiriAppSaveData_v021"];
const LEGACY_PHOTO_KEYS = ["bamiriAppPhotosDB_v023", "bamiriAppPhotosDB_v022", "bamiriAppPhotosDB_v021"];
const MAX_RECORD_PHOTOS = 3;
const APP_VERSION = "v0.4.9";

window.appPhotos = {};
let currentMemoCardId = null;
let storagePersistenceGranted = null;
let photoStoreHealth = null;

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

let appData = {
    eventTitle: "",
    tabs: [
        { id: generateId(), name: "シーン1", usePosition: false, basePointDesc: "", cards: [createEmptyCardData()] }
    ],
    activeTabId: null
};

function createEmptyCardData(prefillType, prefillNum) {
    return {
        id: generateId(),
        typeVal: prefillType || "",
        numVal: prefillNum || "",
        customVal: "",
        name: "",
        positions: [],
        note: "",
        isLocked: false,
        photos: []
    };
}

function getActiveTab() {
    var active = null;
    for (var i = 0; i < appData.tabs.length; i++) {
        if (appData.tabs[i].id === appData.activeTabId) {
            active = appData.tabs[i];
            break;
        }
    }
    return active;
}

function findCardById(cardId) {
    var tab = getActiveTab();
    if (!tab) return null;
    for (var i = 0; i < tab.cards.length; i++) {
        if (tab.cards[i].id === cardId) return tab.cards[i];
    }
    return null;
}

function escapeHtml(value) {
    return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function sanitizeFileName(name) {
    if (!name) return "";
    return String(name).replace(/[\\/:*?"<>|]/g, "_").replace(/[\x00-\x1F\x7F]/g, "").trim();
}

function sanitizeCADText(value) {
    return String(value == null ? "" : value).replace(/[\r\n\t]+/g, " ").replace(/'/g, "").replace(/\s+/g, " ").trim();
}

function escapeCSV(val) {
    if (!val && val !== 0) return "";
    var str = String(val).replace(/[\r\n]+/g, " ");
    if (/^[=+\-@]/.test(str)) str = "'" + str;
    return '"' + str.replace(/"/g, '""') + '"';
}

function getFileNamePrefix() {
    var title = sanitizeFileName(appData.eventTitle || "舞台リンクメモ");
    return title || "舞台リンクメモ";
}

function isDirectLocalOpen() {
    return location.protocol === "file:" || location.protocol === "content:";
}

function getPhotoStorageKey(id) {
    return PHOTO_KEY_PREFIX + id;
}

function collectPhotoIds() {
    var ids = [];
    for (var t = 0; t < appData.tabs.length; t++) {
        var tab = appData.tabs[t];
        ids.push("base-" + tab.id);
        for (var c = 0; c < tab.cards.length; c++) {
            var card = tab.cards[c];
            if (Array.isArray(card.photos)) {
                for (var p = 0; p < card.photos.length; p++) {
                    if (card.photos[p] && card.photos[p].id) ids.push(card.photos[p].id);
                }
            }
        }
    }
    return ids;
}

async function loadPhotoFromStore(id) {
    if (window.appPhotos[id]) return window.appPhotos[id];
    if (typeof localforage === "undefined") return null;
    try {
        var data = await localforage.getItem(getPhotoStorageKey(id));
        if (typeof data === "string" && data) {
            window.appPhotos[id] = data;
            return data;
        }
    } catch (e) {
        console.error("写真読込失敗:", e);
    }
    return null;
}

async function savePhotoToStore(id, base64Data) {
    window.appPhotos[id] = base64Data;
    if (typeof localforage === "undefined") return false;
    try {
        await localforage.setItem(getPhotoStorageKey(id), base64Data);
        return true;
    } catch (e) {
        console.error("写真保存失敗:", e);
        return false;
    }
}

async function removePhotoFromStore(id) {
    delete window.appPhotos[id];
    if (typeof localforage === "undefined") return;
    try {
        await localforage.removeItem(getPhotoStorageKey(id));
    } catch (e) {
        console.error("写真削除失敗:", e);
    }
}

async function preloadAllPhotos() {
    var ids = collectPhotoIds();
    for (var i = 0; i < ids.length; i++) {
        await loadPhotoFromStore(ids[i]);
    }
}

function countLoadedPhotos() {
    return Object.keys(window.appPhotos).filter(function (id) { return !!window.appPhotos[id]; }).length;
}

async function checkPhotoStoreHealth() {
    if (typeof localforage === "undefined") {
        photoStoreHealth = false;
        return false;
    }
    try {
        var probeKey = PHOTO_KEY_PREFIX + "__probe__";
        await localforage.setItem(probeKey, "ok");
        var result = await localforage.getItem(probeKey);
        await localforage.removeItem(probeKey);
        photoStoreHealth = result === "ok";
        return photoStoreHealth;
    } catch (e) {
        photoStoreHealth = false;
        return false;
    }
}

async function requestPersistentStorage() {
    if (!navigator.storage || !navigator.storage.persist) {
        storagePersistenceGranted = null;
        return null;
    }
    try {
        storagePersistenceGranted = await navigator.storage.persist();
        return storagePersistenceGranted;
    } catch (e) {
        storagePersistenceGranted = null;
        return null;
    }
}

function updateStorageStatus(extraMessage) {
    var card = document.getElementById("storage-status-card");
    var text = document.getElementById("storage-status-text");
    if (!card || !text) return;

    card.classList.remove("warn", "error");
    var messages = [];
    var level = "ok";

    if (extraMessage) messages.push(extraMessage);
    if (isDirectLocalOpen()) {
        messages.push("このHTMLを端末内から直接開いています。写真保存は不安定な場合がありますが、写真撮影自体は続けて試せます。");
        level = "warn";
    } else {
        messages.push("HTTPSで開いていればホーム画面追加やオフライン起動が使いやすくなります。初回は通信ありで一度開いてください。");
    }

    messages.push("現在の写真: " + countLoadedPhotos() + "枚");

    if (photoStoreHealth === true) {
        messages.push("写真保存領域: 利用可能");
    } else if (photoStoreHealth === false) {
        messages.push("写真保存領域: 利用できません");
        level = "error";
    } else {
        messages.push("写真保存領域: 未確認");
        if (level !== "error") level = "warn";
    }

    if (storagePersistenceGranted === true) {
        messages.push("保存保持: 要求済み");
    } else if (storagePersistenceGranted === false) {
        messages.push("保存保持: 未許可");
        if (level === "ok") level = "warn";
    } else {
        messages.push("保存保持: ブラウザ依存");
    }

    if (level === "warn") card.classList.add("warn");
    if (level === "error") card.classList.add("error");
    text.textContent = messages.join("\n");
}

async function migrateLegacyPhotosIfNeeded() {
    if (typeof localforage === "undefined") return;
    var legacyPhotos = null;
    for (var i = 0; i < LEGACY_PHOTO_KEYS.length; i++) {
        try {
            var candidate = await localforage.getItem(LEGACY_PHOTO_KEYS[i]);
            if (candidate && typeof candidate === "object") {
                legacyPhotos = candidate;
                break;
            }
        } catch (e) {}
    }
    if (!legacyPhotos) return;

    if (legacyPhotos["base"] && appData.tabs[0] && !legacyPhotos["base-" + appData.tabs[0].id]) {
        legacyPhotos["base-" + appData.tabs[0].id] = legacyPhotos["base"];
    }
    delete legacyPhotos["base"];

    var keys = Object.keys(legacyPhotos);
    for (var k = 0; k < keys.length; k++) {
        var id = keys[k];
        var data = legacyPhotos[id];
        if (typeof data !== "string" || data.indexOf("data:image/") !== 0) continue;
        var storageKey = getPhotoStorageKey(id);
        var existing = await localforage.getItem(storageKey);
        if (!existing) await localforage.setItem(storageKey, data);
        window.appPhotos[id] = data;
    }
}

function normalizeAppData(data) {
    if (!data || !Array.isArray(data.tabs) || data.tabs.length === 0) {
        return {
            eventTitle: "",
            tabs: [{ id: generateId(), name: "シーン1", usePosition: false, basePointDesc: "", cards: [createEmptyCardData()] }],
            activeTabId: null
        };
    }

    for (var i = 0; i < data.tabs.length; i++) {
        var tab = data.tabs[i];
        if (typeof tab.usePosition !== "boolean") tab.usePosition = false;
        if (!Array.isArray(tab.cards)) tab.cards = [];
        for (var j = 0; j < tab.cards.length; j++) {
            var card = tab.cards[j];
            if (!Array.isArray(card.positions)) {
                if (false /* legacy */) {
                    card.positions = [{
                        id: generateId(),
                        dirX: card.dirX || "",
                        distX: card.distX || "",
                        dirY: card.dirY || "奥",
                        distY: card.distY || ""
                    }];
                } else {
                    card.positions = [];
                }
            }
            if (!Array.isArray(card.photos)) card.photos = [];
            card.photos = card.photos.filter(Boolean).map(function (p) {
                return typeof p === "string" ? { id: p } : p;
            });
        }
        if (tab.cards.length === 0) tab.cards.push(createEmptyCardData());
    }

    if (!data.activeTabId && data.tabs[0]) data.activeTabId = data.tabs[0].id;
    return data;
}

    return (tab.name ? tab.name + "_" : "") + baseId;

        var photos = Array.isArray(card.photos) ? card.photos : [];
        if (photos.length > 0) camBtn.classList.add("has-photo");

        for (var i = 0; i < photos.length; i++) {
            var photoMeta = photos[i];
            var data = await loadPhotoFromStore(photoMeta.id);
            if (!data) continue;

            var wrap = document.createElement("div");
            wrap.className = "photo-item";

            var img = document.createElement("img");
            img.src = data;
            img.className = "photo-preview";
            img.style.display = "block";
            img.alt = "記録写真";
            img.onclick = (function (src) {
                return function () { openImageModal(src); };
            })(data);

            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "photo-delete-btn";
            btn.textContent = "🗑️ この写真を削除";
            btn.disabled = card.isLocked;
            btn.onclick = (function (cardId, photoId) {
                return function () { removeRecordPhoto(cardId, photoId); };
            })(card.id, photoMeta.id);

            wrap.appendChild(img);
            wrap.appendChild(btn);
            photoList.appendChild(wrap);
        }
    }, 0);

    return div;
}

function fileToDataURL(file) {
    return new Promise(function (resolve, reject) {
        try {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result); };
            reader.onerror = function () { reject(new Error("写真ファイルの読み込みに失敗しました。")); };
            reader.onabort = function () { reject(new Error("写真ファイルの読み込みが中断されました。")); };
            reader.readAsDataURL(file);
        } catch (e) {
            reject(e);
        }
    });
}

function compressImage(file, maxWidth, maxHeight, quality) {
    return new Promise(function (resolve) {
        var reader = new FileReader();
        reader.onload = function (event) {
            var img = new Image();
            img.onload = function () {
                var width = img.width;
                var height = img.height;
                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else if (height > maxHeight) {
                    width = Math.round((width * maxHeight) / height);
                    height = maxHeight;
                }
                var canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                var ctx = canvas.getContext("2d");
                if (!ctx) return resolve(null);
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL("image/jpeg", quality));
            };
            img.onerror = function () { resolve(null); };
            img.src = event.target.result;
        };
        reader.onerror = function () { resolve(null); };
        reader.readAsDataURL(file);
    });
}

async function handleBasePhoto(event, id) {
    var file = event.target.files[0];
    if (!file) return;

    var cameraBtn = document.getElementById("cameraBtn-" + id);
    var preview = document.getElementById("preview-" + id);
    var delBtn = document.getElementById("deletePhotoBtn-" + id);

    if (cameraBtn) cameraBtn.innerHTML = "⏳ 写真を処理中...";
    try {
        var rawData = await fileToDataURL(file);
        var compressedData = await compressImage(file, 1200, 1200, 0.7);
        var dataToStore = compressedData && compressedData.length < rawData.length ? compressedData : rawData;
        var saved = await savePhotoToStore(id, dataToStore);

        if (preview) {
            preview.src = dataToStore;
            preview.style.display = "block";
        }
        if (delBtn) delBtn.style.display = "block";
        if (cameraBtn) {
            cameraBtn.classList.add("has-photo");
            cameraBtn.innerHTML = saved ? "✅ 写真撮影済み（タップで撮り直し）" : "⚠️ 一時表示中（保存未完了）";
        }
        saveData();
        updateStorageStatus(saved ? "写真を保存しました。" : "写真は画面表示のみで、保存が完了していません。");
    } catch (error) {
        console.error(error);
        if (cameraBtn) {
            cameraBtn.classList.remove("has-photo");
            cameraBtn.innerHTML = "📷 基準点の写真を選択/撮影";
        }
        alert("写真の読み込みに失敗しました。");
    } finally {
        event.target.value = "";
    }
}

async function handleRecordPhoto(event, cardId) {
    var file = event.target.files[0];
    if (!file) return;
    var card = findCardById(cardId);
    if (!card) return;

    if (!Array.isArray(card.photos)) card.photos = [];
    if (card.photos.length >= MAX_RECORD_PHOTOS) {
        alert("写真は1件につき" + MAX_RECORD_PHOTOS + "枚までです。");
        event.target.value = "";
        return;
    }

    try {
        var rawData = await fileToDataURL(file);
        var compressedData = await compressImage(file, 1200, 1200, 0.7);
        var dataToStore = compressedData && compressedData.length < rawData.length ? compressedData : rawData;
        var photoId = cardId + "_photo_" + Date.now();
        var saved = await savePhotoToStore(photoId, dataToStore);
        if (!saved) {
            alert("写真の保存に失敗しました。");
            event.target.value = "";
            return;
        }

        card.photos.push({ id: photoId });
        saveData();
        renderCards();
        updateStorageStatus("写真を保存しました。");
    } catch (error) {
        console.error(error);
        alert("写真の読み込みに失敗しました。");
    } finally {
        event.target.value = "";
    }
}

function syncDOMtoData() {
    var eventTitleEl = document.getElementById("event-title");

    var activeTab = getActiveTab();

    if (usePositionEl) activeTab.usePosition = usePositionEl.checked;
    var baseDescEl = document.getElementById("base-point-desc-" + activeTab.id);
    if (baseDescEl) activeTab.basePointDesc = baseDescEl.value;

    var cardEls = document.querySelectorAll("#app .record-card");
    var updatedCards = [];
    cardEls.forEach(function (el) {
        var id = el.getAttribute("data-id");
        var prev = findCardById(id) || { photos: [] };

        var typeSel = document.getElementById("typeSelect-" + id);
        var numSel = document.getElementById("numSelect-" + id);
        var customInput = document.getElementById("recordCustom-" + id);
        var nameInput = document.getElementById("name-" + id);
        var noteInput = document.getElementById("note-" + id);

        if (typeSel) {
            updatedCards.push({
                id: id,
                typeVal: typeSel.value,
                numVal: numSel ? numSel.value : "",
                customVal: customInput ? customInput.value : "",
                name: nameInput ? nameInput.value : "",
                positions: (function () {
                    var positions = Array.isArray(prev.positions) ? prev.positions.map(function (p) { return { id: p.id, dirX: "", distX: "", dirY: "奥", distY: "" }; }) : [];
                    for (var pi = 0; pi < positions.length; pi++) {
                        var pos = positions[pi];
                        var dirXEl = document.getElementById("dirX-" + id + "-" + pos.id);
                        var distXEl = document.getElementById("distX-" + id + "-" + pos.id);
                        var dirYEl = document.getElementById("dirY-" + id + "-" + pos.id);
                        var distYEl = document.getElementById("distY-" + id + "-" + pos.id);
                        pos.dirX = dirXEl ? dirXEl.value : "";
                        pos.distX = distXEl ? distXEl.value : "";
                        pos.dirY = dirYEl ? dirYEl.value : "奥";
                        pos.distY = distYEl ? distYEl.value : "";
                    }
                    return positions;
                })(),
                note: noteInput ? noteInput.value : "",
                isLocked: el.classList.contains("is-locked"),
                photos: Array.isArray(prev.photos) ? prev.photos : []
            });
        }
    });
    activeTab.cards = updatedCards;
}


function collectUsedNumbers(typeVal, excludeCardId) {
    var tab = getActiveTab();
    var used = {};
    if (!tab) return used;
    for (var i = 0; i < tab.cards.length; i++) {
        var card = tab.cards[i];
        if (card.id === excludeCardId) continue;
        if (card.typeVal === typeVal && card.numVal) used[card.numVal] = true;
    }
    return used;
}

function enforceUniqueNumberOptions(cardId) {
    var typeSel = document.getElementById("typeSelect-" + cardId);
    var numSel = document.getElementById("numSelect-" + cardId);
    if (!typeSel || !numSel) return;
    var selectedType = typeSel.value;
    if (!selectedType || selectedType === "custom" || !RECORD_TYPES[selectedType]) return;

    var currentValue = numSel.value;
    var used = collectUsedNumbers(selectedType, cardId);
    var maxNum = RECORD_TYPES[selectedType];
    var options = '<option value="">番号</option>';
    for (var i = 1; i <= maxNum; i++) {
        var nStr = String(i).padStart(2, "0");
        var disabled = used[nStr] && nStr !== currentValue;
        options += '<option value="' + nStr + '"' + (nStr === currentValue ? ' selected' : '') + (disabled ? ' disabled' : '') + '>' + nStr + (disabled ? '（使用中）' : '') + '</option>';
    }
    numSel.innerHTML = options;
    if (currentValue && used[currentValue] && currentValue !== numSel.value) {
        numSel.value = "";
    }
}

function refreshAllUniqueNumberOptions() {
    var tab = getActiveTab();
    if (!tab) return;
    for (var i = 0; i < tab.cards.length; i++) {
        enforceUniqueNumberOptions(tab.cards[i].id);
    }
}

function saveData() {

}

        if (typeof localforage !== "undefined") {
            var ids = collectPhotoIds();
            for (var i = 0; i < ids.length; i++) await removePhotoFromStore(ids[i]);
            for (var j = 0; j < LEGACY_PHOTO_KEYS.length; j++) {

            }
        }

        appData = {

                { id: generateId(), name: "シーン1", usePosition: false, basePointDesc: "", cards: [createEmptyCardData()] }
            ],
            activeTabId: null

    var lastCard = activeTab.cards[activeTab.cards.length - 1];
    if (!lastCard.typeVal || lastCard.typeVal === "custom") { addCard(lastCard.typeVal || "", ""); return; }

    var nextNumInt = lastCard.numVal ? parseInt(lastCard.numVal, 10) + 1 : 1;
    var maxNum = RECORD_TYPES[lastCard.typeVal];
    if (nextNumInt > maxNum) {
        alert(lastCard.typeVal + "は" + maxNum + "番までです。新しい枠のみ追加します。");
        addCard(lastCard.typeVal, "");
    } else {
        addCard(lastCard.typeVal, String(nextNumInt).padStart(2, "0"));
    }
    setTimeout(function () {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }, 50);

async function exportZIP() {

        alert("ZIP保存に必要なライブラリの読み込みに失敗しました。");
        return;
    }
    syncDOMtoData();
    await preloadAllPhotos();

    appData.tabs.forEach(function (t) {
        if (t.cards.length > 0 || t.basePointDesc || window.appPhotos["base-" + t.id]) hasAnyData = true;
    });
    if (!hasAnyData) {
        alert("データがありません。");
        return;
    }

    var overlay = document.getElementById("loading-overlay");
    overlay.innerHTML = "ZIPデータをまとめています...📦<br>しばらくお待ちください";
    overlay.style.display = "flex";

    try {
        var zip = new JSZip();
        var csvContent = "\uFEFF";
        var jsonlLines = [];
        var fileNamePrefix = getFileNamePrefix();
        var manifest = {
            app_name: "舞台リンクメモ",
            app_version: APP_VERSION,
            exported_at: new Date().toISOString(),
            event_title: appData.eventTitle || "",
            zip_file_name: fileNamePrefix + ".zip",
            csv_file: "records.csv",
            jsonl_file: "records.jsonl",
            manifest_file: "manifest.json",
            tab_count: appData.tabs.length,
            record_count: 0,
            photo_count: 0,
            base_point_photo_count: 0,
            tabs: []
        };

        if (appData.eventTitle) csvContent += "公演タイトル," + escapeCSV(appData.eventTitle) + "\n\n";
        csvContent += 'タブ名(シーン),記録ID,対象名,"X方向\n(上手/下手)",,X距離,,"Y方向\n(前/奥)",,Y距離,,メモ,\n';

        for (var t = 0; t < appData.tabs.length; t++) {
            var tab = appData.tabs[t];
            var baseId = "base-" + tab.id;
            var basePhotoPath = "";

            if (window.appPhotos[baseId]) {
                basePhotoPath = "photos/" + sanitizeFileName(tab.name + "_基準点.jpg");
                zip.file(basePhotoPath, window.appPhotos[baseId].split(",")[1], { base64: true });
                manifest.base_point_photo_count += 1;
                manifest.photo_count += 1;
            }

            manifest.tabs.push({
                tab_id: tab.id,
                tab_name: tab.name,
                use_position: !!tab.usePosition,
                base_point_description: tab.basePointDesc || "",
                base_point_photo: basePhotoPath || null
            });

            var baseNote = tab.basePointDesc || "";
            var baseRow = [
                tab.name,
                tab.usePosition ? "📍基準点" : "位置情報未使用",
                "",
                "",
                "",
                "",
                "",
                "",
                "",
                "",
                "",
                basePhotoPath ? (baseNote + (baseNote ? " " : "") + "(写真: " + basePhotoPath + ")") : baseNote
            ];
            csvContent += baseRow.map(escapeCSV).join(",") + "\n";

            for (var c = 0; c < tab.cards.length; c++) {
                var card = tab.cards[c];
                var finalId = makeRecordId(card);
                var displayId = card.typeVal === "custom"
                    ? (card.customVal || "")
                    : (card.typeVal && card.numVal ? card.typeVal + "ー" + card.numVal : "");

                var photoPaths = [];
                if (Array.isArray(card.photos)) {
                    for (var p = 0; p < card.photos.length; p++) {
                        var photoMeta = card.photos[p];
                        var data = window.appPhotos[photoMeta.id] || await loadPhotoFromStore(photoMeta.id);
                        if (!data) continue;
                        var photoFilePath = "photos/" + sanitizeFileName(finalId + "_" + (p + 1) + ".jpg");
                        zip.file(photoFilePath, data.split(",")[1], { base64: true });
                        photoPaths.push(photoFilePath);
                        manifest.photo_count += 1;
                    }
                }

                var positions = Array.isArray(card.positions) ? card.positions : [];
                if (!tab.usePosition || positions.length === 0) positions = [null];

                for (var rp = 0; rp < positions.length; rp++) {
                    var pos = positions[rp];
                    var outDirX = (tab.usePosition && pos) ? pos.dirX : "";
                    var outDirY = (tab.usePosition && pos) ? pos.dirY : "";
                    var outDistX = (tab.usePosition && pos && pos.dirX !== "センター") ? pos.distX : "";
                    var outDistY = (tab.usePosition && pos) ? pos.distY : "";
                    var outHeX = (tab.usePosition && pos && pos.dirX !== "センター") ? "へ" : "";
                    var outMmX = (tab.usePosition && pos && pos.dirX !== "センター") ? "mm" : "";
                    var outHeY = (tab.usePosition && pos) ? "へ" : "";
                    var outMmY = (tab.usePosition && pos) ? "mm" : "";
                    var note = card.note || "";
                    if (positions.length > 1 && pos) note += (note ? " " : "") + "[座標" + (rp + 1) + "]";
                    if (photoPaths.length) note += (note ? " " : "") + "(写真: " + photoPaths.join(" / ") + ")";
                    var row = [tab.name, finalId, card.name, outDirX, outHeX, outDistX, outMmX, outDirY, outHeY, outDistY, outMmY, note];
                    csvContent += row.map(escapeCSV).join(",") + "\n";
                }

                var recordObject = {
                    event_title: appData.eventTitle || "",
                    tab_id: tab.id,
                    tab_name: tab.name,
                    use_position_tab: !!tab.usePosition,
                    base_point: {
                        description: tab.basePointDesc || "",
                        photo: basePhotoPath || null
                    },
                    record_internal_id: card.id,
                    record_id: finalId,
                    display_id: displayId,
                    item_type: card.typeVal || "",
                    item_number: card.numVal || "",
                    custom_id: card.customVal || "",
                    subject_name: card.name || "",
                    note: card.note || "",
                    is_locked: !!card.isLocked,
                    positions: (Array.isArray(card.positions) ? card.positions : []).map(function (pos, index) {
                        return {
                            index: index + 1,
                            x_dir: pos.dirX || "",
                            x_mm: pos.dirX === "センター" ? "" : (pos.distX || ""),
                            y_dir: pos.dirY || "",
                            y_mm: pos.distY || ""
                        };
                    }),
                    photos: photoPaths,
                    photo_count: photoPaths.length,
                    source_app: "舞台リンクメモ",
                    source_version: APP_VERSION
                };
                jsonlLines.push(JSON.stringify(recordObject));
                manifest.record_count += 1;
            }
        }

        zip.file("records.csv", csvContent);
        zip.file("records.jsonl", jsonlLines.join("\n"));
        zip.file("manifest.json", JSON.stringify(manifest, null, 2));

        var content = await zip.generateAsync({ type: "blob" });
        var url = URL.createObjectURL(content);
        var link = document.createElement("a");
        link.href = url;
        link.download = fileNamePrefix + ".zip";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    } catch (error) {
        console.error(error);
        alert("保存中にエラーが発生しました。\n" + error.message);
    } finally {
        overlay.style.display = "none";
    }
}

function executeCADExport() {
    closeCADModal();
    syncDOMtoData();

    var incTab = document.getElementById("cad-chk-tab").checked;
    var incTitle = document.getElementById("cad-chk-title").checked;
    var incId = document.getElementById("cad-chk-id").checked;
    var incName = document.getElementById("cad-chk-name").checked;
    var incNote = document.getElementById("cad-chk-note").checked;
    var eventTitle = sanitizeCADText(appData.eventTitle);

    var vsContent = "PROCEDURE ImportStageLinkMemo;\nBEGIN\n";

    appData.tabs.forEach(function (tab) {
        var safeTabName = sanitizeCADText(tab.name);
        tab.cards.forEach(function (card) {
            var finalId = makeRecordId(card);
            var safeName = sanitizeCADText(card.name || "");
            var safeId = sanitizeCADText(finalId);
            var safeNote = sanitizeCADText(card.note || "");
            var positions = Array.isArray(card.positions) && card.positions.length ? card.positions : [null];

            positions.forEach(function (pos, idx) {
                var x = 0;
                if (tab.usePosition && pos) {
                    if (pos.dirX === "上手") x = Number(pos.distX) || 0;
                    else if (pos.dirX === "下手") x = -(Number(pos.distX) || 0);
                }
                var y = 0;
                if (tab.usePosition && pos) {
                    if (pos.dirY === "奥") y = Number(pos.distY) || 0;
                    else if (pos.dirY === "前") y = -(Number(pos.distY) || 0);
                }

                var labelParts = [];
                if (incTab && safeTabName) labelParts.push(safeTabName);
                if (incTitle && eventTitle) labelParts.push(eventTitle);
                if (incId && safeId) labelParts.push(safeId);
                if (incName && safeName) labelParts.push(safeName);
                if (incNote && safeNote) labelParts.push(safeNote);
                if (pos && positions.length > 1) labelParts.push("座標" + (idx + 1));

                var labelText = labelParts.join(" : ");
                vsContent += "  Locus(" + x + ", " + y + ");\n";
                if (labelText) {
                    vsContent += "  TextOrigin(" + (x + 100) + ", " + (y + 100) + ");\n  CreateText('" + labelText + "');\n";
                }
            });
        });
    });

    vsContent += "END;\nRun(ImportStageLinkMemo);\n";

    var blob = new Blob([vsContent], { type: "text/plain;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = getFileNamePrefix() + "_VWスクリプト.txt";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

async function loadData() {
    try {
        var saved = localStorage.getItem(SAVE_KEY);
        if (!saved) {
            for (var i = 0; i < LEGACY_SAVE_KEYS.length; i++) {
                var oldSaved = localStorage.getItem(LEGACY_SAVE_KEYS[i]);
                if (!oldSaved) continue;
                try {
                    appData = normalizeAppData(JSON.parse(oldSaved));
                    break;
                } catch (e) {}
            }
        } else {
            appData = normalizeAppData(JSON.parse(saved));
        }

        if (!appData.activeTabId && appData.tabs[0]) appData.activeTabId = appData.tabs[0].id;

        var eventTitleEl = document.getElementById("event-title");
        if (eventTitleEl) eventTitleEl.value = appData.eventTitle || "";

        if (typeof localforage !== "undefined") {
            try {
                await migrateLegacyPhotosIfNeeded();
                await preloadAllPhotos();
                await checkPhotoStoreHealth();
                await requestPersistentStorage();
            } catch (e) {
                console.error("写真復元エラー", e);
                photoStoreHealth = false;
            }
        } else {
            photoStoreHealth = false;
        }

        renderTabs();
        renderCards();
        updateStorageStatus();

        if (isDirectLocalOpen() && !sessionStorage.getItem("stage_link_memo_warning_shown")) {
            sessionStorage.setItem("stage_link_memo_warning_shown", "1");
            alert("このHTMLを端末内から直接開いているため、写真保存は不安定です。\n重要な写真は作業後すぐにZIP保存してください。");
        }
    } catch (error) {
        console.error(error);
        alert("初期化でエラーが発生しました。\n" + error.message);
        updateStorageStatus("初期化でエラーが発生しました。");
    }
}

async function registerServiceWorker() {
    if (!("serviceWorker" in navigator)) return;
    if (!(location.protocol === "https:" || location.hostname === "localhost")) return;
    try {
        const reg = await navigator.serviceWorker.register("./sw.js");
        if (reg && reg.update) {
            try { await reg.update(); } catch (e) {}
        }
    } catch (e) {
        console.error("Service Worker registration failed:", e);
    }
}

window.onload = function () {
    loadData();
    registerServiceWorker();
};
